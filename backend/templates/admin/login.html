<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Log in — EdgeBourne</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="{{ static_url('css/admin.css') }}">
</head>
<body class="admin login-page">
{% include "_svg_defs.html" %}
<div class="login-card">
  <svg viewBox="0 0 190 190" class="login-seal"><use href="#seal"/></svg>
  <div class="wordmark wordmark-dark">Edge<span class="accent">Bourne</span></div>
  <p class="login-sub">ADMIN</p>
  {% with msgs = get_flashed_messages(with_categories=true) %}
    {% for cat, m in msgs %}<div class="flash flash-{{ cat }}">{{ m }}</div>{% endfor %}
  {% endwith %}
  <form method="post" action="/admin/login">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <input type="hidden" name="next" value="{{ request.args.get('next', '') }}">
    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required autofocus autocomplete="username">
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required autocomplete="current-password">
    </div>
    <button class="btn btn-primary btn-block" type="submit">Log in</button>
  </form>
</div>
</body>
</html>
